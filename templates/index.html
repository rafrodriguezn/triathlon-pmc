<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Triathlon PMC</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #f0f6fc;
      letter-spacing: 0.03em;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
      flex-wrap: wrap;
    }

    /* Date-range buttons */
    .range-btn {
      background: #21262d;
      color: #8b949e;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .range-btn:hover { background: #30363d; color: #c9d1d9; }
    .range-btn.active {
      background: #1f6feb;
      color: #fff;
      border-color: #1f6feb;
    }

    /* Sync button */
    #syncBtn {
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    #syncBtn:hover { background: #2ea043; }
    #syncBtn:disabled { background: #21262d; color: #6e7681; cursor: not-allowed; }

    #formBadge {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    /* Status bar */
    #statusBar {
      font-size: 0.78rem;
      color: #6e7681;
      white-space: nowrap;
    }

    /* Chart area */
    .chart-container {
      flex: 1;
      padding: 20px 24px 24px;
      position: relative;
      min-height: 0;
    }

    canvas {
      width: 100% !important;
      height: calc(100vh - 120px) !important;
    }

    /* Legend */
    .legend {
      display: flex;
      gap: 20px;
      padding: 8px 24px 4px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: #8b949e;
      cursor: pointer;
      user-select: none;
      transition: opacity 0.15s;
      padding: 2px 4px;
      border-radius: 4px;
    }
    .legend-item:hover { opacity: 0.75; background: rgba(255,255,255,0.04); }
    .legend-item.hidden { opacity: 0.35; text-decoration: line-through; }
    .legend-dot {
      width: 12px;
      height: 4px;
      border-radius: 2px;
    }

    /* Toast notification */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 0.82rem;
      color: #c9d1d9;
      max-width: 320px;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.2s, transform 0.2s;
      z-index: 99;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.error { border-color: #da3633; color: #ff7b72; }
    #toast.success { border-color: #238636; color: #3fb950; }

    /* ── Chat panel ── */
    #chatToggle {
      background: #21262d;
      color: #8b949e;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    #chatToggle:hover, #chatToggle.active {
      background: #1f6feb;
      color: #fff;
      border-color: #1f6feb;
    }

    #chatPanel {
      position: fixed;
      right: 0; top: 0; bottom: 0;
      width: 380px;
      background: #0d1117;
      border-left: 1px solid #21262d;
      display: flex;
      flex-direction: column;
      z-index: 200;
      transform: translateX(100%);
      transition: transform 0.25s ease;
    }
    #chatPanel.open { transform: translateX(0); }

    #chatHeader {
      padding: 14px 16px;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.88rem;
      font-weight: 600;
      color: #f0f6fc;
    }
    #chatClose {
      background: none;
      border: none;
      color: #6e7681;
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
    }
    #chatClose:hover { color: #c9d1d9; }

    #chatMessages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chat-msg {
      max-width: 92%;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 0.83rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .chat-msg.user {
      align-self: flex-end;
      background: #1f6feb;
      color: #fff;
      border-bottom-right-radius: 2px;
    }
    .chat-msg.assistant {
      align-self: flex-start;
      background: #161b22;
      color: #c9d1d9;
      border: 1px solid #21262d;
      border-bottom-left-radius: 2px;
    }
    .chat-msg.assistant { ... }  /* overridden below */
    .chat-msg.assistant h1,
    .chat-msg.assistant h2,
    .chat-msg.assistant h3 {
      font-size: 0.85rem;
      font-weight: 700;
      color: #f0f6fc;
      margin: 8px 0 4px;
    }
    .chat-msg.assistant p { margin: 4px 0; }
    .chat-msg.assistant ul,
    .chat-msg.assistant ol { padding-left: 16px; margin: 4px 0; }
    .chat-msg.assistant li { margin: 2px 0; }
    .chat-msg.assistant strong { color: #f0f6fc; }
    .chat-msg.assistant table {
      border-collapse: collapse;
      width: 100%;
      font-size: 0.78rem;
      margin: 6px 0;
    }
    .chat-msg.assistant th,
    .chat-msg.assistant td {
      border: 1px solid #30363d;
      padding: 4px 8px;
      text-align: left;
    }
    .chat-msg.assistant th { background: #21262d; color: #f0f6fc; }
    .chat-msg.assistant hr { border-color: #21262d; margin: 6px 0; }
    .chat-msg.assistant code {
      background: #21262d;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 0.78rem;
    }

    .chat-suggestions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 0 16px 8px;
    }
    .suggestion-btn {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 6px;
      color: #8b949e;
      font-size: 0.78rem;
      padding: 7px 10px;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .suggestion-btn:hover { background: #21262d; color: #c9d1d9; }

    #chatInputRow {
      padding: 12px 16px;
      border-top: 1px solid #21262d;
      display: flex;
      gap: 8px;
    }
    #chatInput {
      flex: 1;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 0.83rem;
      padding: 8px 10px;
      resize: none;
      outline: none;
      font-family: inherit;
      line-height: 1.4;
    }
    #chatInput:focus { border-color: #1f6feb; }
    #chatSend {
      background: #1f6feb;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 0.85rem;
      padding: 8px 14px;
      cursor: pointer;
      transition: background 0.15s;
      align-self: flex-end;
    }
    #chatSend:hover { background: #388bfd; }
    #chatSend:disabled { background: #21262d; color: #6e7681; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <h1>🏊‍♂️🚴‍♂️🏃‍♂️ Performance Manager Chart</h1>

  <div class="header-controls">
    <!-- Date range -->
    <button class="range-btn" data-days="30">1M</button>
    <button class="range-btn active" data-days="90">3M</button>
    <button class="range-btn" data-days="180">6M</button>
    <button class="range-btn" data-days="365">1Y</button>
    <button class="range-btn" data-days="730">2Y</button>
    <button class="range-btn" data-days="1825">5Y</button>
    <button class="range-btn" data-days="0">All</button>

    <span id="statusBar">Loading…</span>
    <span id="formBadge" style="display:none"></span>
    <input type="file" id="sleepFileInput" accept=".csv" style="display:none">
    <button id="sleepSyncBtn" class="range-btn" title="Sync sleep via browser cookie (same as Sync Garmin)">💤 Sync Sleep</button>
    <button id="sleepUploadBtn" class="range-btn" title="Fallback: upload Garmin sleep export CSV" style="font-size:0.72rem; color:#6e7681;">↑ CSV</button>
    <button id="syncBtn">⟳ Sync Garmin</button>
    <button id="chatToggle">💬 Coach</button>
  </div>
</header>

<!-- ── Chat panel ── -->
<div id="chatPanel">
  <div id="chatHeader">
    <span>🏅 Training Coach</span>
    <button id="chatClose">✕</button>
  </div>

  <div id="chatMessages">
    <div class="chat-msg assistant">Hey! I can see your current training load. Ask me anything about your fitness, fatigue, or form — or try one of the suggestions below.</div>
  </div>

  <div class="chat-suggestions" id="suggestions">
    <button class="suggestion-btn">How is my current form for racing?</button>
    <button class="suggestion-btn">Am I training too hard right now?</button>
    <button class="suggestion-btn">How long until I peak for a race?</button>
    <button class="suggestion-btn">Explain my CTL, ATL and TSB numbers.</button>
  </div>

  <div id="chatInputRow">
    <textarea id="chatInput" rows="1" placeholder="Ask your coach…"></textarea>
    <button id="chatSend">Send</button>
  </div>
</div>

<!-- Manual legend — click to toggle series -->
<div class="legend">
  <div class="legend-item" data-series="CTL" onclick="toggleSeries(this)">
    <div class="legend-dot" style="background:#1f6feb; height:8px;"></div> CTL (Fitness)
  </div>
  <div class="legend-item" data-series="ATL" onclick="toggleSeries(this)">
    <div class="legend-dot" style="background:#da3f85;"></div> ATL (Fatigue)
  </div>
  <div class="legend-item" data-series="TSB" onclick="toggleSeries(this)">
    <div class="legend-dot" style="background:#e3b341;"></div> TSB (Form)
  </div>
  <div class="legend-item" data-series="TSS" onclick="toggleSeries(this)">
    <div class="legend-dot" style="background:#f85149; width:8px; height:8px; border-radius:50%;"></div> TSS
  </div>
  <div class="legend-item" data-series="Sleep Score" onclick="toggleSeries(this)" id="sleepLegend" style="display:none">
    <div class="legend-dot" style="background:#a371f7;"></div> Sleep Score
  </div>
  <div class="legend-item" data-series="HRV" onclick="toggleSeries(this)" id="hrvLegend" style="display:none">
    <div class="legend-dot" style="background:#39d0c8;"></div> HRV
  </div>
</div>

<div class="chart-container">
  <canvas id="pmcChart"></canvas>
</div>

<div id="toast"></div>

<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let allRows = [];       // full dataset from /api/pmc?days=all
let chart = null;
let activeDays = 90;   // currently selected date range
let sleepScores = {};  // date → sleep score (0–100)
const hiddenSeries = new Set(); // series labels toggled off

// ---------------------------------------------------------------------------
// Utilities
// ---------------------------------------------------------------------------
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = ''; }, 4000);
}

function setStatus(text) {
  document.getElementById('statusBar').textContent = text;
}

// ---------------------------------------------------------------------------
// Data loading
// ---------------------------------------------------------------------------
async function loadSleep() {
  try {
    const res = await fetch('/api/sleep');
    const json = await res.json();
    if (json.ok) {
      sleepScores = json.sleep || {};
      const hasSleep = Object.values(sleepScores).some(v => (typeof v === 'object' ? v.score : v) != null);
      const hasHrv   = Object.values(sleepScores).some(v => typeof v === 'object' && v.hrv != null);
      document.getElementById('sleepLegend').style.display = hasSleep ? 'flex' : 'none';
      document.getElementById('hrvLegend').style.display   = hasHrv   ? 'flex' : 'none';
    }
  } catch { /* silent — sleep data is optional */ }
}

async function loadPMC() {
  try {
    // Always fetch maximum history; filter client-side for range buttons
    const res = await fetch('/api/pmc?days=1825');
    const json = await res.json();

    if (!json.ok) {
      setStatus('No data — click Sync Garmin');
      showToast(json.error || 'No data cached.', 'error');
      return;
    }

    allRows = json.rows;
    const syncTime = json.synced_at
      ? new Date(json.synced_at).toLocaleString()
      : 'unknown';
    setStatus(`Last sync: ${syncTime} · ${json.rows.length} days · LTHR ${json.lthr}`);

    // Today's Form badge
    const latest = json.rows[json.rows.length - 1];
    if (latest) {
      const tsb = latest.tsb;
      let label, bg, color;
      if      (tsb >  25) { label = `🔵 Very Fresh (${tsb > 0 ? '+':''}${tsb})`;   bg = 'rgba(100,160,255,0.2)'; color = '#79c0ff'; }
      else if (tsb >   5) { label = `🟢 Race Ready (${tsb > 0 ? '+':''}${tsb})`;   bg = 'rgba(63,185,80,0.2)';  color = '#3fb950'; }
      else if (tsb > -10) { label = `⚪ Normal (${tsb > 0 ? '+':''}${tsb})`;        bg = 'rgba(255,255,255,0.08)';color= '#c9d1d9'; }
      else if (tsb > -20) { label = `🟡 Tired (${tsb})`;                            bg = 'rgba(255,180,0,0.2)';  color = '#e3b341'; }
      else if (tsb > -30) { label = `🟠 Hard Block (${tsb})`;                       bg = 'rgba(255,100,50,0.2)'; color = '#f0883e'; }
      else                { label = `🔴 Danger (${tsb})`;                           bg = 'rgba(220,50,50,0.2)';  color = '#f85149'; }
      const badge = document.getElementById('formBadge');
      badge.textContent = label;
      badge.style.background = bg;
      badge.style.color = color;
      badge.style.display = 'inline-block';
    }

    await loadSleep();
    renderChart(activeDays);
  } catch (err) {
    setStatus('Error loading data');
    showToast('Failed to load PMC data: ' + err.message, 'error');
  }
}

// ---------------------------------------------------------------------------
// Chart rendering
// ---------------------------------------------------------------------------
function getFilteredRows(days) {
  if (!days || days === 0) return allRows;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days);
  const cutoffStr = cutoff.toISOString().slice(0, 10);
  return allRows.filter(r => r.date >= cutoffStr);
}

function renderChart(days) {
  const rows = getFilteredRows(days);
  if (!rows.length) return;

  const labels = rows.map(r => r.date);
  const ctlData  = rows.map(r => r.ctl);
  const atlData  = rows.map(r => r.atl);
  const tsbData  = rows.map(r => r.tsb);
  const tssData  = rows.map(r => r.tss > 0 ? r.tss : null);
  const actNames = rows.map(r => r.activities || []);
  const sleepData = labels.map(d => {
    const v = sleepScores[d];
    return v ? (typeof v === 'object' ? (v.score ?? null) : v) : null;
  });
  const hrvData  = labels.map(d => {
    const v = sleepScores[d];
    return (v && typeof v === 'object') ? (v.hrv ?? null) : null;
  });
  const hasSleep = sleepData.some(v => v !== null);
  const hasHrv   = hrvData.some(v => v !== null);

  const datasets = [
    // CTL — blue filled area (left axis)
    {
      label: 'CTL',
      data: ctlData,
      yAxisID: 'y',
      borderColor: '#1f6feb',
      backgroundColor: 'rgba(31, 111, 235, 0.15)',
      fill: true,
      borderWidth: 2,
      pointRadius: 0,
      pointHoverRadius: 4,
      tension: 0.3,
      order: 3,
    },
    // ATL — magenta line (left axis)
    {
      label: 'ATL',
      data: atlData,
      yAxisID: 'y',
      borderColor: '#da3f85',
      backgroundColor: 'transparent',
      borderWidth: 1.5,
      pointRadius: 0,
      pointHoverRadius: 4,
      tension: 0.3,
      order: 2,
    },
    // TSB — gold line (right axis)
    {
      label: 'TSB',
      data: tsbData,
      yAxisID: 'y2',
      borderColor: '#e3b341',
      backgroundColor: 'transparent',
      borderWidth: 1.5,
      pointRadius: 0,
      pointHoverRadius: 4,
      tension: 0.3,
      order: 1,
    },
    // TSS — red scatter dots (left axis)
    {
      label: 'TSS',
      data: tssData,
      yAxisID: 'y',
      type: 'scatter',
      borderColor: '#f85149',
      backgroundColor: 'rgba(248, 81, 73, 0.7)',
      pointRadius: 4,
      pointHoverRadius: 6,
      order: 0,
    },
    // Sleep Score — purple line (y3 axis, 0–100)
    {
      label: 'Sleep Score',
      data: sleepData,
      yAxisID: 'y3',
      borderColor: '#a371f7',
      backgroundColor: 'rgba(163, 113, 247, 0.08)',
      fill: false,
      borderWidth: 1.5,
      pointRadius: hasSleep ? 2 : 0,
      pointHoverRadius: 5,
      tension: 0.3,
      spanGaps: true,
      order: 1,
    },
    // HRV — teal line (y3 axis, same 0–100 visual range; HRV ~20–80ms fits well)
    {
      label: 'HRV',
      data: hrvData,
      yAxisID: 'y3',
      borderColor: '#39d0c8',
      backgroundColor: 'rgba(57, 208, 200, 0.06)',
      fill: false,
      borderWidth: 1.5,
      pointRadius: hasHrv ? 2 : 0,
      pointHoverRadius: 5,
      tension: 0.3,
      spanGaps: true,
      order: 1,
    },
  ];

  // Apply persisted toggle state
  datasets.forEach(ds => { ds.hidden = hiddenSeries.has(ds.label); });
  // Sync legend item classes
  document.querySelectorAll('.legend-item[data-series]').forEach(item => {
    item.classList.toggle('hidden', hiddenSeries.has(item.dataset.series));
  });

  const config = {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 300 },
      interaction: {
        mode: 'index',
        intersect: false,
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#161b22',
          borderColor: '#30363d',
          borderWidth: 1,
          titleColor: '#f0f6fc',
          bodyColor: '#8b949e',
          padding: 12,
          callbacks: {
            title(items) {
              return items[0]?.label ?? '';
            },
            label(item) {
              const v = item.raw;
              if (v == null) return null;
              const label = item.dataset.label;
              const val = typeof v === 'object' ? v.y : v;
              return `  ${label}: ${Number(val).toFixed(1)}`;
            },
            afterBody(items) {
              const idx = items[0]?.dataIndex;
              if (idx == null) return [];
              const names = actNames[idx];
              if (!names || !names.length) return [];
              return ['', ...names.map(n => '  ' + n)];
            },
          },
        },
      },
      scales: {
        x: {
          type: 'category',
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: {
            color: '#6e7681',
            maxTicksLimit: 12,
            maxRotation: 0,
          },
        },
        y: {
          position: 'left',
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { color: '#6e7681' },
          title: {
            display: true,
            text: 'CTL / ATL / TSS',
            color: '#6e7681',
            font: { size: 11 },
          },
        },
        y2: {
          position: 'right',
          grid: { drawOnChartArea: false },
          ticks: { color: '#e3b341' },
          title: {
            display: true,
            text: 'TSB (Form)',
            color: '#e3b341',
            font: { size: 11 },
          },
        },
        y3: {
          position: 'right',
          min: 0,
          max: 120,
          display: hasSleep || hasHrv,
          grid: { drawOnChartArea: false },
          ticks: { color: '#a371f7', count: 5 },
          title: {
            display: hasSleep || hasHrv,
            text: 'Sleep / HRV',
            color: '#a371f7',
            font: { size: 11 },
          },
        },
      },
    },
    plugins: [
      // TSB zone bands + zero reference line
      {
        id: 'tsbZones',
        beforeDraw(chart) {
          const y2 = chart.scales['y2'];
          if (!y2) return;
          const ctx = chart.ctx;
          const { left, right } = chart.chartArea;

          // Zone definitions: [top, bottom, color]
          const zones = [
            [Infinity,  25, 'rgba(100,160,255,0.07)'],  // > +25  very fresh (blue)
            [25,         5, 'rgba(63,185,80,0.10)'],     // +5→+25 race-ready (green)
            [5,        -10, 'rgba(255,255,255,0.04)'],   // -10→+5 normal (neutral)
            [-10,      -20, 'rgba(255,180,0,0.09)'],     // -20→-10 tired (amber)
            [-20,      -30, 'rgba(255,100,50,0.10)'],    // -30→-20 hard block (orange)
            [-30, -Infinity,'rgba(220,50,50,0.12)'],     // < -30  danger (red)
          ];

          ctx.save();
          zones.forEach(([top, bot, color]) => {
            const yTop = y2.getPixelForValue(Math.min(top,  y2.max));
            const yBot = y2.getPixelForValue(Math.max(bot,  y2.min));
            ctx.fillStyle = color;
            ctx.fillRect(left, yTop, right - left, yBot - yTop);
          });
          ctx.restore();
        },
        afterDraw(chart) {
          const y2 = chart.scales['y2'];
          if (!y2) return;
          const ctx = chart.ctx;
          const y = y2.getPixelForValue(0);
          ctx.save();
          ctx.beginPath();
          ctx.moveTo(chart.chartArea.left, y);
          ctx.lineTo(chart.chartArea.right, y);
          ctx.strokeStyle = 'rgba(227, 179, 65, 0.45)';
          ctx.lineWidth = 1;
          ctx.setLineDash([4, 4]);
          ctx.stroke();
          ctx.restore();
        },
      },
    ],
  };

  if (chart) {
    chart.destroy();
  }
  chart = new Chart(document.getElementById('pmcChart'), config);
}

// ---------------------------------------------------------------------------
// Sync
// ---------------------------------------------------------------------------
const SYNC_COOLDOWN_MS = 30000; // 30 seconds — prevents rate-limit hammering
let lastSyncAttempt = 0;

async function syncGarmin() {
  const now = Date.now();
  const remaining = Math.ceil((SYNC_COOLDOWN_MS - (now - lastSyncAttempt)) / 1000);

  if (now - lastSyncAttempt < SYNC_COOLDOWN_MS) {
    showToast(`Wait ${remaining}s before syncing again.`, 'error');
    return;
  }

  lastSyncAttempt = now;
  const btn = document.getElementById('syncBtn');
  btn.disabled = true;
  btn.textContent = '⟳ Syncing…';
  setStatus('Syncing with Garmin…');

  try {
    const res = await fetch('/api/sync');
    const json = await res.json();

    if (json.ok) {
      showToast(`✓ ${json.message}`, 'success');
      await loadPMC();
    } else {
      const msg = json.error || 'unknown error';
      const hint = msg.includes('429') ? ' — wait a few minutes before retrying.' : '';
      showToast('Sync error: ' + msg + hint, 'error');
      setStatus('Sync failed');
    }
  } catch (err) {
    showToast('Network error: ' + err.message, 'error');
    setStatus('Sync failed');
  } finally {
    btn.disabled = false;
    btn.textContent = '⟳ Sync Garmin';
  }
}

// ---------------------------------------------------------------------------
// Event listeners
// ---------------------------------------------------------------------------
document.getElementById('syncBtn').addEventListener('click', syncGarmin);

document.querySelectorAll('.range-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeDays = parseInt(btn.dataset.days, 10);
    renderChart(activeDays);
  });
});

// ---------------------------------------------------------------------------
// Series toggle (legend click)
// ---------------------------------------------------------------------------
function toggleSeries(legendItem) {
  const label = legendItem.dataset.series;
  if (hiddenSeries.has(label)) {
    hiddenSeries.delete(label);
  } else {
    hiddenSeries.add(label);
  }
  legendItem.classList.toggle('hidden', hiddenSeries.has(label));
  if (!chart) return;
  const ds = chart.data.datasets.find(d => d.label === label);
  if (ds) {
    ds.hidden = hiddenSeries.has(label);
    chart.update();
  }
}

    if (json.ok) {
      showToast(`✓ Sleep: ${json.added} days added (${json.total} total)`, 'success');
      await loadSleep();

});

// ---------------------------------------------------------------------------
// Chat
// ---------------------------------------------------------------------------
const chatPanel    = document.getElementById('chatPanel');
const chatMessages = document.getElementById('chatMessages');
const chatInput    = document.getElementById('chatInput');
const chatSend     = document.getElementById('chatSend');
const suggestions  = document.getElementById('suggestions');

const CHAT_STORAGE_KEY = 'triathlon_pmc_chat';
let chatHistory = JSON.parse(localStorage.getItem(CHAT_STORAGE_KEY) || '[]');
let isStreaming = false;

function toggleChat() {
  chatPanel.classList.toggle('open');
  document.getElementById('chatToggle').classList.toggle('active');
  if (chatPanel.classList.contains('open')) chatInput.focus();
}

document.getElementById('chatToggle').addEventListener('click', toggleChat);
document.getElementById('chatClose').addEventListener('click', toggleChat);

// Suggestion buttons
document.querySelectorAll('.suggestion-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    chatInput.value = btn.textContent;
    suggestions.style.display = 'none';
    sendChat();
  });
});

// Send on Enter (Shift+Enter for newline)
chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChat();
  }
});
chatSend.addEventListener('click', sendChat);

function appendMessage(role, text) {
  const div = document.createElement('div');
  div.className = `chat-msg ${role}`;
  if (role === 'assistant') {
    div.innerHTML = marked.parse(text || '');
  } else {
    div.textContent = text;
  }
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return div;
}

async function sendChat() {
  const text = chatInput.value.trim();
  if (!text || isStreaming) return;

  chatInput.value = '';
  chatInput.style.height = 'auto';
  suggestions.style.display = 'none';
  isStreaming = true;
  chatSend.disabled = true;

  // Show user message
  appendMessage('user', text);
  chatHistory.push({ role: 'user', content: text });
  localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(chatHistory));

  // Placeholder for streaming assistant response
  const assistantDiv = appendMessage('assistant', '');
  assistantDiv.classList.add('streaming');

  let fullText = '';

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: chatHistory }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      assistantDiv.textContent = 'Error: ' + (err.error || res.statusText);
      assistantDiv.classList.remove('streaming');
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();   // keep incomplete line

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') break;
        try {
          const { text: chunk } = JSON.parse(data);
          fullText += chunk;
          assistantDiv.innerHTML = marked.parse(fullText);
          chatMessages.scrollTop = chatMessages.scrollHeight;
        } catch { /* ignore parse errors */ }
      }
    }

    assistantDiv.classList.remove('streaming');
    chatHistory.push({ role: 'assistant', content: fullText });
    localStorage.setItem(CHAT_STORAGE_KEY, JSON.stringify(chatHistory));

  } catch (err) {
    assistantDiv.textContent = 'Network error: ' + err.message;
    assistantDiv.classList.remove('streaming');
  } finally {
    isStreaming = false;
    chatSend.disabled = false;
    chatInput.focus();
  }
}

// Auto-resize textarea
chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
});

// Restore chat history from localStorage
chatHistory.forEach(msg => appendMessage(msg.role, msg.content));
</script>
